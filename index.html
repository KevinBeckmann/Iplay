<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPlay Store - Tech Edition</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary-bg: #05070a;
            --card-bg: rgba(26, 29, 36, 0.95);
            --accent: #5eff5e;     /* Verde Neon */
            --accent-glow: rgba(94, 255, 94, 0.4);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            /* Fundo Circuito Tech */
            background-image: 
                linear-gradient(rgba(5, 7, 10, 0.94), rgba(5, 7, 10, 0.94)),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M54.627 0l.83.828-1.415 1.415-.828-.828-.828.828-1.415-1.415.83.828 3.585 3.585-1.415 1.415-1.414-1.414-2.72 2.72-2.304 2.305-1.415-1.414 2.305-2.305 2.72-2.72-1.414-1.414-3.585 3.585-.828-.828-3.585-3.585 1.415-1.415 3.585 3.585.828-.828-.828-.828 3.585-3.585 1.415 1.415-3.585 3.585 1.414 1.414 2.72-2.72 2.305-2.305-1.414-1.415-2.305 2.305-2.72 2.72 1.415 1.415 3.585-3.585.828.828zM22.485 0l.83.828-1.415 1.415-.828-.828-.828.828-1.415-1.415.83.828 3.585 3.585-1.415 1.415-1.414-1.414-2.72 2.72-2.304 2.305-1.415-1.414 2.305-2.305 2.72-2.72-1.414-1.414-3.585 3.585-.828-.828-3.585-3.585 1.415-1.415 3.585 3.585.828-.828-.828-.828 3.585-3.585 1.415 1.415-3.585 3.585 1.414 1.414 2.72-2.72 2.305-2.305-1.414-1.415-2.305 2.305-2.72 2.72 1.415 1.415 3.585-3.585.828.828z' fill='%235eff5e' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        /* --- Header --- */
        header {
            background: rgba(15, 17, 21, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--accent);
            box-shadow: 0 0 15px rgba(94, 255, 94, 0.1);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-icon {
            font-size: 2.5rem;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
            animation: pulse 3s infinite;
        }

        .logo-text {
            font-family: 'Arial Black', sans-serif;
            font-size: 1.8rem;
            letter-spacing: -1px;
            color: #fff;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 10px var(--accent-glow); }
            50% { text-shadow: 0 0 25px var(--accent-glow); }
        }

        /* Controles de Busca e Filtro */
        .controls-area {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        .search-box {
            position: relative;
            flex-grow: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            padding: 10px 40px 10px 15px;
            border-radius: 25px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }
        
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(94, 255, 94, 0.2); }
        .search-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            /* Scroll suave para mobile */
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Firefox */
        }
        
        /* Ocultar barra de rolagem das categorias */
        .categories::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }

        .cat-btn:hover, .cat-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(94, 255, 94, 0.05);
        }

        .cart-trigger {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- Layout Grid Principal --- */
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
            color: #fff;
        }

        /* Grid de Produtos */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Estilo dos Cards */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: var(--accent);
        }

        .product-img-container {
            width: 100%;
            height: 200px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .product-img {
            max-width: 100%;
            max-height: 180px;
            object-fit: contain;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .product-info h3 { font-size: 1.1rem; margin-bottom: 5px; color: #fff; }
        .product-info p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px; }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .price { font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        .add-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .add-btn:hover { background: var(--accent); color: #000; }

        /* --- MODAIS (Carrinho e Checkout) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            display: none;
            justify-content: flex-end; /* Sidebar style for cart */
        }

        .modal-overlay.active { display: flex; }

        /* Painel Lateral do Carrinho */
        .cart-panel {
            background: #111;
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-color);
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .cart-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-items-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            align-items: center;
        }

        .cart-item img { width: 50px; height: 50px; object-fit: contain; }
        
        .cart-item-info { flex: 1; }
        .cart-item-title { font-size: 0.9rem; margin-bottom: 5px; }
        .cart-item-price { color: var(--accent); font-size: 0.9rem; }
        
        .cart-controls button {
            background: #333; color: #fff; border: none;
            width: 25px; height: 25px; border-radius: 5px; cursor: pointer;
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: #0a0a0a;
        }

        .btn-checkout {
            width: 100%;
            background: var(--accent);
            color: #000;
            font-weight: bold;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Modal Checkout (Centralizado) */
        #checkoutModal { justify-content: center; align-items: center; }
        
        .checkout-box {
            background: #1a1d24;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--border-color);
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; background: #000; border: 1px solid #333;
            color: #fff; border-radius: 5px;
        }

        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #333; color: #fff; border: none; padding: 10px; border-radius: 5px; flex: 1; cursor: pointer;}
        .btn-confirm { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 5px; flex: 1; font-weight: bold; cursor: pointer;}

        /* Responsividade e Mobile */
        @media (max-width: 768px) {
            .header-content { align-items: stretch; }
            .controls-area { flex-direction: column; }
            .search-box { width: 100%; max-width: none; }
            .cart-trigger { width: 100%; justify-content: center; }
            
            .products-grid {
                /* Reduzir tamanho mínimo da coluna em tablets */
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 15px;
            }
        }

        /* Ajustes Específicos para Celular (Telas pequenas) */
        @media (max-width: 480px) {
            .logo-text { font-size: 1.4rem; }
            .logo-icon { font-size: 2rem; }
            
            .container { padding: 0 15px; margin: 20px auto; }
            
            /* Em celulares, 1 coluna para melhor visualização */
            .products-grid { grid-template-columns: 1fr; }
            
            .product-card { padding: 15px; }
            .product-img-container { height: 160px; }
            
            /* Carrinho ocupa tela inteira */
            .cart-panel { max-width: 100%; width: 100%; }
            
            /* Modal Checkout responsivo */
            .checkout-box { width: 95%; padding: 20px; }
            .btn-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo-area">
                <i class="fab fa-apple logo-icon"></i>
                <div class="logo-text">iPLAY <span style="color:var(--accent)">TECH</span></div>
            </div>

            <div class="controls-area">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Buscar produtos..." onkeyup="filterProducts()">
                    <i class="fas fa-search"></i>
                </div>
                
                <div class="categories">
                    <button class="cat-btn active" onclick="setCategory('all', this)">Todos</button>
                    <button class="cat-btn" onclick="setCategory('iphone', this)">iPhones</button>
                    <button class="cat-btn" onclick="setCategory('mac', this)">MacBooks</button>
                    <button class="cat-btn" onclick="setCategory('watch', this)">Watches</button>
                    <button class="cat-btn" onclick="setCategory('audio', this)">Áudio</button>
                </div>

                <button class="cart-trigger" onclick="openCart()">
                    <i class="fas fa-shopping-cart"></i> 
                    <span id="cartCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title" id="pageTitle">Catálogo Completo</h2>
        
        <div class="products-grid" id="productsGrid">
            <!-- Produtos serão injetados via JS -->
        </div>
    </div>

    <!-- MODAL CARRINHO -->
    <div class="modal-overlay" id="cartModal">
        <div class="cart-panel">
            <div class="cart-header">
                <h3>Seu Carrinho</h3>
                <button onclick="closeCart()" style="background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            
            <div class="cart-items-container" id="cartItems">
                <div style="text-align:center; color:#666; margin-top:50px;">Carrinho vazio</div>
            </div>

            <div class="cart-footer">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:1.2rem;">
                    <span>Total:</span>
                    <span style="color:var(--accent); font-weight:bold;" id="cartTotal">$0.00</span>
                </div>
                <button class="btn-checkout" onclick="openCheckout()">Finalizar Compra</button>
            </div>
        </div>
    </div>

    <!-- MODAL CHECKOUT -->
    <div class="modal-overlay" id="checkoutModal">
        <div class="checkout-box">
            <h2 style="margin-bottom:20px; color:var(--accent);">Finalizar Pedido</h2>
            <form onsubmit="submitOrder(event)">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" required placeholder="Ex: João da Silva">
                </div>
                <div class="form-group">
                    <label>Endereço de Entrega</label>
                    <input type="text" required placeholder="Rua, Número, Bairro">
                </div>
                <div class="form-group">
                    <label>Pagamento</label>
                    <select>
                        <option>Cartão de Crédito</option>
                        <option>PIX (5% desc)</option>
                        <option>Boleto</option>
                    </select>
                </div>
                
                <div class="btn-row">
                    <button type="button" class="btn-cancel" onclick="closeCheckout()">Cancelar</button>
                    <button type="submit" class="btn-confirm">Confirmar Pedido</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Dados dos Produtos (Fotos placeholders)
        const products = [
            { id: 1, name: "iPhone 15 Pro Max", category: "iphone", price: 1599, img: "https://images.unsplash.com/photo-1695048133142-1a20484d2569?auto=format&fit=crop&w=400&q=80", desc: "1TB Natural Titanium" },
            { id: 2, name: "MacBook Pro 14", category: "mac", price: 1999, img: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=400&q=80", desc: "M3 Pro Chip" },
            { id: 3, name: "Apple Watch Ultra 2", category: "watch", price: 799, img: "https://images.unsplash.com/photo-1697551388656-78788484e5b6?auto=format&fit=crop&w=400&q=80", desc: "Titanium Case" },
            { id: 4, name: "AirPods Pro 2", category: "audio", price: 249, img: "https://images.unsplash.com/photo-1603351154351-5cf99bc32f2d?auto=format&fit=crop&w=400&q=80", desc: "USB-C MagSafe" },
            { id: 5, name: "iPhone 14", category: "iphone", price: 699, img: "https://images.unsplash.com/photo-1678685888221-cda773a3dcdb?auto=format&fit=crop&w=400&q=80", desc: "128GB Blue" },
            { id: 6, name: "HomePod Mini", category: "audio", price: 99, img: "https://images.unsplash.com/photo-1612815154858-60aa4c465a7a?auto=format&fit=crop&w=400&q=80", desc: "Space Gray" },
            { id: 7, name: "Magic Mouse", category: "mac", price: 79, img: "https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7?auto=format&fit=crop&w=400&q=80", desc: "Black Surface" },
            { id: 8, name: "iPad Air", category: "mac", price: 599, img: "https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?auto=format&fit=crop&w=400&q=80", desc: "M1 Chip" }
        ];

        let cart = [];
        let currentCategory = 'all';

        // Inicialização
        function init() {
            renderProducts(products);
        }

        // Renderizar Produtos na Grid
        function renderProducts(list) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = "";

            if (list.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center; padding:20px;'>Nenhum produto encontrado.</p>";
                return;
            }

            list.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-img-container">
                        <img src="${product.img}" class="product-img" alt="${product.name}">
                    </div>
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p>${product.desc}</p>
                        <div class="price-row">
                            <span class="price">$${product.price}</span>
                            <button class="add-btn" onclick="addToCart(${product.id})">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Filtro por Categoria
        function setCategory(cat, btn) {
            currentCategory = cat;
            
            // Atualizar UI dos botões
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            // Filtrar
            if (cat === 'all') {
                renderProducts(products);
                document.getElementById('pageTitle').innerText = "Catálogo Completo";
            } else {
                const filtered = products.filter(p => p.category === cat);
                renderProducts(filtered);
                document.getElementById('pageTitle').innerText = cat.charAt(0).toUpperCase() + cat.slice(1);
            }
        }

        // Busca
        function filterProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => 
                (currentCategory === 'all' || p.category === currentCategory) &&
                (p.name.toLowerCase().includes(term) || p.desc.toLowerCase().includes(term))
            );
            renderProducts(filtered);
        }

        // --- LÓGICA DO CARRINHO ---
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existingItem = cart.find(item => item.id === id);

            if (existingItem) {
                existingItem.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCartUI();
            
            // Pequeno feedback visual (opcional)
            openCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        }

        function changeQty(id, change) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += change;
                if (item.qty <= 0) removeFromCart(id);
                else updateCartUI();
            }
        }

        function updateCartUI() {
            const container = document.getElementById('cartItems');
            const countSpan = document.getElementById('cartCount');
            const totalSpan = document.getElementById('cartTotal');

            // Atualiza badge
            const totalItems = cart.reduce((acc, item) => acc + item.qty, 0);
            countSpan.innerText = totalItems;

            // Renderiza lista
            if (cart.length === 0) {
                container.innerHTML = "<div style='text-align:center; color:#666; margin-top:50px;'>Carrinho vazio</div>";
                totalSpan.innerText = "$0.00";
                return;
            }

            container.innerHTML = "";
            let totalPrice = 0;

            cart.forEach(item => {
                totalPrice += item.price * item.qty;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <img src="${item.img}" alt="${item.name}">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-price">$${item.price} x ${item.qty}</div>
                    </div>
                    <div class="cart-controls">
                        <button onclick="changeQty(${item.id}, -1)">-</button>
                        <button onclick="changeQty(${item.id}, 1)">+</button>
                    </div>
                `;
                container.appendChild(div);
            });

            totalSpan.innerText = "$" + totalPrice.toLocaleString();
        }

        // --- CONTROLE DE MODAIS ---
        function openCart() { document.getElementById('cartModal').classList.add('active'); }
        function closeCart() { document.getElementById('cartModal').classList.remove('active'); }

        function openCheckout() {
            if (cart.length === 0) return alert("Adicione itens ao carrinho!");
            closeCart();
            document.getElementById('checkoutModal').classList.add('active');
        }
        function closeCheckout() { document.getElementById('checkoutModal').classList.remove('active'); }

        function submitOrder(e) {
            e.preventDefault();
            alert("Compra realizada com sucesso! 🎉\nObrigado por escolher a iPlay Tech.");
            cart = [];
            updateCartUI();
            closeCheckout();
        }

        // Inicia a loja
        init();

        // Fechar modais ao clicar fora
        document.getElementById('cartModal').addEventListener('click', (e) => {
            if (e.target.id === 'cartModal') closeCart();
        });
        document.getElementById('checkoutModal').addEventListener('click', (e) => {
            if (e.target.id === 'checkoutModal') closeCheckout();
        });

    </script>
</body>
</html>
